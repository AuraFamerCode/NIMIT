version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=file:./backtest.db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MODEL=${MODEL:-moonshotai/kimi-k2.6}
      - YOUR_SITE_URL=${YOUR_SITE_URL:-http://localhost:3000}
      - YOUR_SITE_NAME=${YOUR_SITE_NAME:-AI Backtester}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./backtest.db:/app/backtest.db
      - ./.prisma-home:/app/.prisma-home
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

